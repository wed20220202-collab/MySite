      return REALTIME_LOGIN_EMAILS

    async function setMonitoredLoginState(user, isLoggedIn) {
      const email = user?.email || '';
      if (!shouldMirrorLoginToRealtime(email)) return;

      const studentId = email.split('@')[0] || localStorage.getItem('festival_student_id') || '';
      await setUserLoginState(studentId, isLoggedIn, { pageName: 'index', email });
    }

    function createLoginPayload(user, statusValue) {
      const email = user?.email || '';
      const studentId = email.split('@')[0];

      return {
        mode: 'recordLoginStatus',
        studentId,
        email,
        schoolCode: getSchoolFolderName(),
        status: statusValue,
        createdAt: new Date().toISOString()
      };
    }

    async function recordLoginStatusToSpreadsheet(user, statusValue, options = {}) {
      const email = user?.email || '';
      if (!email) return;

      const payload = createLoginPayload(user, statusValue);

      if (options.keepalive && navigator.sendBeacon) {
        const blob = new Blob([JSON.stringify(payload)], { type: 'text/plain;charset=utf-8' });
        navigator.sendBeacon(GAS_URL, blob);
        return;
      }

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload),
          keepalive: options.keepalive === true
        });
        const result = await res.json();
        if (!result.success) throw new Error(result.message || 'login status update failed');
      } catch (error) {
        console.warn('login status update failed', error);
      }
    }

    function startLoginHeartbeat(user) {
      currentLoginUser = user;
      clearInterval(loginHeartbeatTimer);
      recordLoginStatusToSpreadsheet(user, 'login');

      loginHeartbeatTimer = setInterval(() => {
        recordLoginStatusToSpreadsheet(user, 'login');
      }, LOGIN_HEARTBEAT_MS);
    }

    async function stopLoginHeartbeat(statusValue = 'logout', options = {}) {
      clearInterval(loginHeartbeatTimer);
      loginHeartbeatTimer = null;

      if (currentLoginUser) {
        await recordLoginStatusToSpreadsheet(currentLoginUser, statusValue, options);
      }

      currentLoginUser = null;

    function assertDriveSettings() {
      if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.includes('ここに')) {
        throw new Error('GOOGLE_CLIENT_IDが未設定です');
      }

      if (!GOOGLE_DRIVE_FOLDER_ID || GOOGLE_DRIVE_FOLDER_ID.includes('ここに')) {
        throw new Error('GOOGLE_DRIVE_FOLDER_IDが未設定です');
      }
    }

    function waitForGoogleIdentity() {
      return new Promise((resolve, reject) => {
        const startedAt = Date.now();

        const timerId = setInterval(() => {
          if (window.google?.accounts?.oauth2) {
            clearInterval(timerId);
            resolve();
            return;
          }

          if (Date.now() - startedAt > 10000) {
            clearInterval(timerId);
            reject(new Error('Google認証ライブラリの読み込みに失敗しました'));
          }
        }, 100);
      });
    }

    async function getGoogleAccessToken(options = {}) {
      assertDriveSettings();
      await waitForGoogleIdentity();

      if (accessToken) return accessToken;

      return new Promise((resolve, reject) => {
        const timeoutId = setTimeout(() => {
          reject(new Error('Google Driveの認証が完了しませんでした。ポップアップ許可とOAuth設定を確認してください'));
        }, 10000);

        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: GOOGLE_DRIVE_SCOPE,
          hint: auth.currentUser?.email || undefined,
          callback: response => {
            clearTimeout(timeoutId);

            if (response.error) {
              reject(new Error(response.error));
              return;
            }

            accessToken = response.access_token;
            resolve(accessToken);
          }
        });

        tokenClient.requestAccessToken({
          prompt: options.prompt ?? ''
        });
      });
    }

    async function getGoogleAccessTokenWithConsentFallback() {
      try {
        return await getGoogleAccessToken({ prompt: '' });
      } catch (error) {
        accessToken = '';
        return getGoogleAccessToken({ prompt: 'consent' });
      }
    }

    async function refreshGoogleAccessToken() {
      accessToken = '';
      return getGoogleAccessToken({ prompt: '' });

    function escapeDriveQueryValue(value) {
      return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function getSchoolFolderName() {
      const studentId = getStudentId();
      const match = studentId.match(/^[^-]+-([a-zA-Z]+)/);
      return match ? match[1].toUpperCase() : 'UNKNOWN';
    }

    function getSchoolFolderCacheKey(folderName) {
      return `festival_drive_school_folder_${GOOGLE_DRIVE_FOLDER_ID}_${folderName}`;
    }

    function getSchoolFolderQuery(folderName) {
      const escapedName = escapeDriveQueryValue(folderName);
      const escapedParent = escapeDriveQueryValue(GOOGLE_DRIVE_FOLDER_ID);

      return [
        "mimeType='application/vnd.google-apps.folder'",
        `name='${escapedName}'`,
        `'${escapedParent}' in parents`,
        'trashed=false'
      ].join(' and ');
    }

    async function fetchSchoolDriveFolders(token, folderName) {
      const query = getSchoolFolderQuery(folderName);
      const searchUrl = [
        'https://www.googleapis.com/drive/v3/files',
        '?supportsAllDrives=true',
        '&includeItemsFromAllDrives=true',
        '&spaces=drive',
        '&pageSize=20',
        '&orderBy=createdTime',
        '&fields=files(id,name,createdTime,modifiedTime)',
        `&q=${encodeURIComponent(query)}`
      ].join('');

      const searchRes = await fetch(searchUrl, {
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      if (searchRes.status === 401) {
        const newToken = await refreshGoogleAccessToken();
        return fetchSchoolDriveFolders(newToken, folderName);
      }

      if (!searchRes.ok) {
        throw new Error(await searchRes.text());
      }

      const searchData = await searchRes.json();
      return (searchData.files || [])
        .filter(folder => folder?.id)
        .sort((a, b) => String(a.createdTime || '').localeCompare(String(b.createdTime || '')));
    }

    async function trashDuplicateSchoolFolder(token, folderId, canonicalFolderId) {
      if (!folderId || folderId === canonicalFolderId) return;

      try {
        await fetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(folderId)}?supportsAllDrives=true`, {
          method: 'PATCH',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json; charset=UTF-8'
          },
          body: JSON.stringify({ trashed: true })
        });
      } catch (error) {
        console.warn('duplicate folder cleanup failed', error);
      }
    }

    async function ensureSchoolDriveFolder(token) {
      const folderName = getSchoolFolderName();
      const cacheKey = getSchoolFolderCacheKey(folderName);
      const cachedFolderId = schoolFolderId || localStorage.getItem(cacheKey);

      cameraStatus.textContent = `学校フォルダ確認中...${folderName}`;

      let folders = await fetchSchoolDriveFolders(token, folderName);

      if (folders.length) {
        const canonicalFolder = folders[0];
        schoolFolderId = canonicalFolder.id;
        localStorage.setItem(cacheKey, canonicalFolder.id);

        if (cachedFolderId && cachedFolderId !== canonicalFolder.id) {
          localStorage.setItem(`${cacheKey}_duplicate_${cachedFolderId}`, new Date().toISOString());
        }

        return canonicalFolder.id;
      }

      cameraStatus.textContent = `学校フォルダ作成中...${folderName}`;

      const createRes = await fetch('https://www.googleapis.com/drive/v3/files?supportsAllDrives=true&fields=id,name,createdTime', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json; charset=UTF-8'
        },
        body: JSON.stringify({
          name: folderName,
          mimeType: 'application/vnd.google-apps.folder',
          parents: [GOOGLE_DRIVE_FOLDER_ID]
        })
      });

      if (createRes.status === 401) {
        const newToken = await refreshGoogleAccessToken();
        return ensureSchoolDriveFolder(newToken);
      }

      if (!createRes.ok) {
        throw new Error(await createRes.text());
      }

      const createdFolder = await createRes.json();

      // Re-check after a short jitter so simultaneous devices converge to one folder.
      await sleep(500 + Math.floor(Math.random() * 700));
      folders = await fetchSchoolDriveFolders(token, folderName);
      const canonicalFolder = folders[0] || createdFolder;

      if (createdFolder.id !== canonicalFolder.id) {
        await trashDuplicateSchoolFolder(token, createdFolder.id, canonicalFolder.id);
      }

      schoolFolderId = canonicalFolder.id;
      localStorage.setItem(cacheKey, canonicalFolder.id);
      return canonicalFolder.id;
    }

    async function startDriveResumableSession(blob, fileInfo, mimeType, token, parentFolderId) {
      const metadata = {
        name: fileInfo.fileName,
        mimeType,
        parents: [parentFolderId],
        description: JSON.stringify({
          studentId: fileInfo.studentId,
          fileNo: fileInfo.fileNo,
          type: fileInfo.type,
          createdAt: new Date().toISOString()
        })
      };

      const url = [
        'https://www.googleapis.com/upload/drive/v3/files',
        '?uploadType=resumable',
        '&supportsAllDrives=true',
        '&fields=id,name,mimeType,size,webViewLink,webContentLink,thumbnailLink'
      ].join('');

      const res = await fetch(url, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json; charset=UTF-8',
          'X-Upload-Content-Type': mimeType,
          'X-Upload-Content-Length': String(blob.size)
        },
        body: JSON.stringify(metadata)
      });

      if (res.status === 401) {
        const newToken = await refreshGoogleAccessToken();
        return startDriveResumableSession(blob, fileInfo, mimeType, newToken, parentFolderId);
      }

      if (!res.ok) {
        throw new Error(await res.text());
      }

      const uploadUrl = res.headers.get('Location');

      if (!uploadUrl) {
        throw new Error('DriveのアップロードURLを取得できませんでした');
      }

      return uploadUrl;
    }

    async function queryDriveUploadOffset(uploadUrl, totalSize) {
      const res = await fetch(uploadUrl, {
        method: 'PUT',
        headers: {
          'Content-Range': `bytes */${totalSize}`
        }
      });

      if (res.status === 308) {
        const range = res.headers.get('Range');
        if (!range) return 0;

        const match = range.match(/bytes=0-(\d+)/);
        return match ? Number(match[1]) + 1 : 0;
      }

      if (res.ok) return totalSize;

      throw new Error(await res.text());
    }

    async function uploadChunkWithRetry(uploadUrl, chunk, start, end, totalSize) {
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          const res = await fetch(uploadUrl, {
            method: 'PUT',
            headers: {
              'Content-Type': chunk.type || 'application/octet-stream',
              'Content-Range': `bytes ${start}-${end - 1}/${totalSize}`
            },
            body: chunk
          });

          if (res.status === 308) {
            const range = res.headers.get('Range');
            const match = range?.match(/bytes=0-(\d+)/);
            return {
              done: false,
              nextStart: match ? Number(match[1]) + 1 : end
            };
          }

          if (res.status === 200 || res.status === 201) {
            return {
              done: true,
              file: await res.json()
            };
          }

          if (res.status >= 500 || res.status === 429) {
            await sleep(800 * attempt);
            const nextStart = await queryDriveUploadOffset(uploadUrl, totalSize);
            return { done: false, nextStart };
          }

          throw new Error(await res.text());
        } catch (error) {
          if (attempt === 3) throw error;
          await sleep(800 * attempt);
        }
      }

      throw new Error('アップロードの再試行回数を超えました');
    }

    async function uploadBlobToGoogleDrive(blob, fileInfo, mimeType) {
      uploadStatus.textContent = `アップロード準備中: ${fileInfo.fileName}`;
      cameraStatus.textContent = 'Google Driveへ接続中...';

      setUploadProgress(0, `アップロード準備中: ${fileInfo.fileName}`);
      const token = await getGoogleAccessToken();
      setUploadProgress(1, `保存先確認中: ${fileInfo.fileName}`);
      const parentFolderId = await ensureSchoolDriveFolder(token);
      setUploadProgress(2, `アップロード開始中: ${fileInfo.fileName}`);
      const uploadUrl = await startDriveResumableSession(blob, fileInfo, mimeType, token, parentFolderId);
      let start = 0;

      while (start < blob.size) {
        const end = Math.min(start + CHUNK_SIZE, blob.size);
        const chunk = blob.slice(start, end, mimeType);

        const result = await uploadChunkWithRetry(uploadUrl, chunk, start, end, blob.size);

        if (result.done) {
          const link = result.file.webViewLink || `https://drive.google.com/file/d/${result.file.id}/view`;
          setUploadProgress(100, `アップロード完了: ${fileInfo.fileName}`);

          try {
            await saveUploadLogToSpreadsheet({
              studentId: fileInfo.studentId,
              schoolCode: getSchoolFolderName(),
              fileNo: fileInfo.fileNo,
              type: fileInfo.type,
              fileName: fileInfo.fileName,
              driveFileId: result.file.id,
              driveFolderId: parentFolderId,
              rootFolderId: GOOGLE_DRIVE_FOLDER_ID,
              driveUrl: link,
              downloadURL: link,
              thumbnailLink: result.file.thumbnailLink || '',
              mimeType,
              size: blob.size,
              createdAt: new Date().toISOString(),
              approved: true
            });
          } catch (logError) {
            console.error(logError);
            uploadStatus.textContent = `Drive保存完了 / ログ保存失敗: ${logError.message}`;
          }
          uploadStatus.innerHTML =
            `アップロード完了: <a href="${link}" target="_blank" rel="noopener">${fileInfo.fileName}</a>`;
          cameraStatus.textContent = `保存完了: ${fileInfo.fileName}`;
          return result.file;
        }

        start = result.nextStart;

        const percent = Math.min(99, Math.round((start / blob.size) * 100));
        uploadStatus.textContent = `アップロード中: ${fileInfo.fileName} / ${percent}%`;
        cameraStatus.textContent = `${percent}%`;
        setUploadProgress(percent, `アップロード中: ${fileInfo.fileName}`);
      }

      throw new Error('アップロード完了レスポンスを取得できませんでした');
    }

    function uploadBlobToFirebaseStorage(blob, fileInfo, mimeType, reason) {
      return new Promise((resolve, reject) => {
        const schoolCode = getSchoolFolderName();
        const storagePath = `fallback/${schoolCode}/${fileInfo.studentId}/${fileInfo.fileName}`;
        const ref = storageRef(storage, storagePath);

        uploadStatus.textContent = `Drive失敗のためStorageへ保存中: ${fileInfo.fileName}`;
        cameraStatus.textContent = 'Storageへ保存中...';
        setUploadProgress(0, `Storageへ保存中: ${fileInfo.fileName}`);

        const task = uploadBytesResumable(ref, blob, {
          contentType: mimeType,
          customMetadata: {
            studentId: fileInfo.studentId,
            fileNo: fileInfo.fileNo,
            type: fileInfo.type,
            schoolCode,
            fallbackReason: String(reason?.message || reason || 'Drive upload failed')
          }
        });

        task.on(
          'state_changed',
          snapshot => {
            const percent = snapshot.totalBytes
              ? Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100)
              : 0;
            setUploadProgress(percent, `Storageへ保存中: ${fileInfo.fileName}`);
          },
          reject,
          async () => {
            try {
              const downloadURL = await getDownloadURL(task.snapshot.ref);

              try {
                await saveUploadLogToSpreadsheet({
                  studentId: fileInfo.studentId,
                  schoolCode,
                  fileNo: fileInfo.fileNo,
                  type: fileInfo.type,
                  fileName: fileInfo.fileName,
                  storagePath,
                  driveFileId: '',
                  driveFolderId: '',
                  rootFolderId: '',
                  driveUrl: '',
                  downloadURL,
                  thumbnailLink: '',
                  mimeType,
                  size: blob.size,
                  createdAt: new Date().toISOString(),
                  approved: true,
                  fallback: true,
                  fallbackReason: String(reason?.message || reason || 'Drive upload failed')
                });
              } catch (logError) {
                console.error(logError);
                uploadStatus.textContent = `Storage保存完了 / ログ保存失敗: ${logError.message}`;
              }

              setUploadProgress(100, `Storage保存完了: ${fileInfo.fileName}`);
              uploadStatus.innerHTML =
                `Storage保存完了 <a href="${downloadURL}" target="_blank" rel="noopener">${fileInfo.fileName}</a>`;
              cameraStatus.textContent = `Storage保存完了: ${fileInfo.fileName}`;
              resolve({ storagePath, downloadURL });
            } catch (error) {
              reject(error);
            }
          }
        );
      });
    }

    async function uploadVideoWithFallback(blob, fileInfo, mimeType) {
      try {
        return await uploadBlobToGoogleDrive(blob, fileInfo, mimeType);
      } catch (driveError) {
        console.warn('Drive upload failed. Falling back to Firebase Storage.', driveError);
        return uploadBlobToFirebaseStorage(blob, fileInfo, mimeType, driveError);
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getVideoTrack() {
      return cameraStream?.getVideoTracks?.()[0] || null;
    }

    function updateTorchButton() {
      const canUseTorch = torchSupported && currentFacingMode === 'environment' && Boolean(getVideoTrack());
      torchToggleBtn.disabled = !canUseTorch;
      torchToggleBtn.classList.toggle('is-active', torchSyncEnabled && canUseTorch);
      torchToggleBtn.setAttribute(
        'title',
        canUseTorch
          ? (torchSyncEnabled ? 'フラッシュ連動を停止' : 'フラッシュ連動を開始')
          : 'この端末またはカメラはフラッシュに未対応です'
      );

      if (!canUseTorch) {
        torchSyncEnabled = false;
      }
    }

    async function refreshTorchCapability() {
      const track = getVideoTrack();
      const capabilities = track?.getCapabilities?.() || {};
      torchSupported = Boolean(capabilities.torch);
      updateTorchButton();
    }

    async function applyTorchState(on, reason = '') {
      const track = getVideoTrack();
      if (!track || !torchSupported) {
        lastTorchReason = !track ? 'no video track' : 'torch unsupported';
        updateTorchDebugPanel();
        return;
      }

      try {
        await track.applyConstraints({ advanced: [{ torch: on }] });
        torchIsOn = on;
        lastTorchError = 'none';
        lastTorchReason = reason || (on ? 'torch on' : 'torch off');
        updateTorchDebugPanel();
      } catch (error) {
        console.warn('torch control failed', error);
        lastTorchError = `${error.name || 'Error'}: ${error.message || ''}`;
        lastTorchReason = 'torch error';
        if (error.name === 'NotSupportedError' || error.name === 'TypeError') {
          torchSupported = false;
          torchSyncEnabled = false;
          torchIsOn = false;
          desiredTorchState = false;
          updateTorchButton();
        }
        updateTorchDebugPanel();
      }
    }

    function setTorch(on, options = {}) {
      const nextTorchState = Boolean(on);

      if (!options.force && desiredTorchState === nextTorchState && (torchIsOn === nextTorchState || torchApplyPending)) {
        lastTorchReason = nextTorchState
          ? (torchIsOn ? 'already on' : 'on pending')
          : (torchIsOn ? 'off pending' : 'already off');
        updateTorchDebugPanel();
        return torchApplyPromise;
      }

      desiredTorchState = nextTorchState;
      torchApplyPending = true;
      updateTorchDebugPanel();

      torchApplyPromise = torchApplyPromise
        .catch(() => {})
        .then(async () => {
          if (!options.force && torchIsOn === desiredTorchState) return;
          await applyTorchState(desiredTorchState, options.reason || '');
        })
        .finally(() => {
          torchApplyPending = false;
          updateTorchDebugPanel();
        });

      return torchApplyPromise;
    }

    function getColorBrightness(color) {
      const match = String(color || '').match(/^#?([0-9a-f]{6})$/i);
      if (!match) return 0;

      const hex = match[1];
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);

      return (r * 0.299) + (g * 0.587) + (b * 0.114);
    }

    function clampNumber(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, number));
    }

    async function pulseTorch(duration = DEFAULT_TORCH_PULSE_MS) {
      const visibleDuration = clampNumber(duration, MIN_TORCH_PULSE_MS, 1800, DEFAULT_TORCH_PULSE_MS);
      const pulseToken = ++torchPulseToken;
      torchPulseCount++;
      lastTorchPulseAt = Date.now();
      torchHoldUntil = 0;
      clearTimeout(torchPulseTimer);
      await setTorch(true, { reason: `pulse on ${visibleDuration}ms` });

      torchPulseTimer = setTimeout(() => {
        if (pulseToken !== torchPulseToken) {
          lastTorchReason = 'stale pulse ignored';
          updateTorchDebugPanel();
          return;
        }

        if (Date.now() < torchHoldUntil) {
          lastTorchReason = 'hold active';
          updateTorchDebugPanel();
          return;
        }

        lastTorchPulseEndedAt = Date.now();
        setTorch(false, { reason: `pulse ended ${visibleDuration}ms` });
      }, visibleDuration);
    }

    function syncTorchWithSession(session, color) {
      if (!torchSyncEnabled || !torchSupported || currentFacingMode !== 'environment') {
        lastTorchReason = !torchSyncEnabled
          ? 'sync off'
          : (!torchSupported ? 'unsupported' : `facing ${currentFacingMode}`);
        updateTorchDebugPanel();
        return;
      }

      const hasBeatInfo = typeof session.beat === 'boolean';
      const frameIndex = Number(session.frameIndex ?? -1);
      const hasFrameIndex = Number.isFinite(frameIndex) && frameIndex >= 0;

      if (!session.isPlaying) {
        torchPulseToken++;
        torchHoldUntil = 0;
        clearTimeout(torchPulseTimer);
        if (torchIsOn || desiredTorchState) setTorch(false, { reason: 'stop/offline' });
        lastTorchFrameIndex = -1;
        lastTorchReason = 'not playing';
        updateTorchDebugPanel();
        return;
      }

      if (session.hasTorchCues) {
        torchPulseToken++;
        clearTimeout(torchPulseTimer);
        lastTorchFrameIndex = -1;

        if (session.torchCueActive) {
          lastTorchPulseAt = Date.now();
          torchHoldUntil = Date.now() + 1200;
          lastTorchReason = 'cue active';
          setTorch(true);
        } else {
          torchHoldUntil = 0;
          lastTorchReason = 'cue inactive';
          if (torchIsOn || desiredTorchState) setTorch(false, { reason: 'cue inactive/off' });
        }

        updateTorchDebugPanel();
        return;
      }

      if ((hasBeatInfo && !session.beat) || (!hasBeatInfo && getColorBrightness(color) < 24)) {
        lastTorchReason = hasBeatInfo ? 'beat false' : 'color too dark';
        updateTorchDebugPanel();
        return;
      }

      if (hasBeatInfo && hasFrameIndex && frameIndex === lastTorchFrameIndex) {
        lastTorchReason = `same frame ${frameIndex}`;
        updateTorchDebugPanel();
        return;
      }

      const now = Date.now();
      const cooldownMs = clampNumber(session.torchCooldownMs, 40, 1000, DEFAULT_TORCH_COOLDOWN_MS);
      if (now - lastTorchPulseAt < cooldownMs) {
        lastTorchReason = `cooldown ${now - lastTorchPulseAt}ms`;
        updateTorchDebugPanel();
        return;
      }

      if (hasBeatInfo && hasFrameIndex) {
        lastTorchFrameIndex = frameIndex;
      }

      lastTorchPulseAt = now;
      lastTorchReason = `pulse frame ${frameIndex}`;
      updateTorchDebugPanel();
      pulseTorch(clampNumber(session.torchPulseMs, MIN_TORCH_PULSE_MS, 1200, DEFAULT_TORCH_PULSE_MS));
    }

    function formatDebugTime(value) {
      if (!value) return '-';
      return new Date(value).toLocaleTimeString('ja-JP', { hour12: false });
    }

    function ensureTorchDebugPanel() {
      if (!torchDebugEnabled) return null;
      if (torchDebugPanel) return torchDebugPanel;

      torchDebugPanel = document.createElement('pre');
      torchDebugPanel.id = 'torchDebugPanel';
      torchDebugPanel.style.cssText = [
        'position:fixed',
        'left:10px',
        'right:10px',
        'bottom:10px',
        'z-index:99999',
        'max-height:42vh',
        'overflow:auto',
        'margin:0',
        'padding:12px',
        'border-radius:12px',
        'background:rgba(15,23,42,.92)',
        'color:#e0f2fe',
        'font:12px/1.45 ui-monospace, SFMono-Regular, Consolas, monospace',
        'white-space:pre-wrap',
        'box-shadow:0 18px 40px rgba(0,0,0,.3)',
        'pointer-events:none'
      ].join(';');
      document.body.appendChild(torchDebugPanel);
      return torchDebugPanel;
    }

    function updateTorchDebugPanel() {
      const panel = ensureTorchDebugPanel();
      if (!panel) return;

      const session = lastActiveSession || {};
      panel.textContent = [
        'SANFES TORCH DEBUG',
        `time: ${new Date().toLocaleTimeString('ja-JP', { hour12: false })}`,
        `torchSupported: ${torchSupported}`,
        `torchSyncEnabled: ${torchSyncEnabled}`,
        `torchIsOn: ${torchIsOn}`,
        `desiredTorchState: ${desiredTorchState}`,
        `torchApplyPending: ${torchApplyPending}`,
        `pulseToken: ${torchPulseToken}`,
        `pulseCount: ${torchPulseCount}`,
        `holdMs: ${Math.max(0, torchHoldUntil - Date.now())}`,
        `facing: ${currentFacingMode}`,
        `hasTrack: ${Boolean(getVideoTrack())}`,
        `isPlaying: ${Boolean(session.isPlaying)}`,
        `beat: ${String(session.beat)}`,
        `frameIndex: ${String(session.frameIndex ?? '-')}`,
        `tickId: ${String(session.tickId ?? '-')}`,
        `sessionAgeMs: ${lastSessionReceivedAt ? Date.now() - lastSessionReceivedAt : '-'}`,
        `hasTorchCues: ${Boolean(session.hasTorchCues)}`,
        `torchCueActive: ${Boolean(session.torchCueActive)}`,
        `color: ${session.color || '-'}`,
        `sequence: ${session.sequenceName || '-'}`,
        `pulseMs: ${String(session.torchPulseMs ?? '-')}`,
        `actualPulseMinMs: ${MIN_TORCH_PULSE_MS}`,
        `cooldownMs: ${String(session.torchCooldownMs ?? '-')}`,
        `lastPulse: ${formatDebugTime(lastTorchPulseAt)}`,
        `lastPulseAgeMs: ${lastTorchPulseAt ? Date.now() - lastTorchPulseAt : '-'}`,
        `lastPulseEnd: ${formatDebugTime(lastTorchPulseEndedAt)}`,
        `reason: ${lastTorchReason}`,
        `error: ${lastTorchError}`
      ].join('\n');
    }

    async function toggleTorchSync() {
      if (!cameraStream) {
        alert('先に背面カメラを起動してください');
        return;
      }

      if (currentFacingMode !== 'environment') {
        alert('フラッシュライトは背面カメラで使用してください');
        return;
      }

      await refreshTorchCapability();

      if (!torchSupported) {
        alert('この端末またはブラウザはフラッシュライト制御に対応していません');
        return;
      }

      torchSyncEnabled = !torchSyncEnabled;
      updateTorchButton();

      if (!torchSyncEnabled) {
        clearTimeout(torchPulseTimer);
        await setTorch(false, { reason: 'manual sync off' });
        lastTorchFrameIndex = -1;
      } else {
        lastTorchFrameIndex = -1;
        lastTorchPulseAt = 0;
        await pulseTorch(TORCH_TEST_PULSE_MS);
        if (lastActiveSession?.isPlaying) {
          syncTorchWithSession(lastActiveSession, lastActiveSession.color);
        }
      }

      cameraStatus.textContent = torchSyncEnabled ? 'フラッシュ連動ON' : 'フラッシュ連動OFF';
      updateTorchDebugPanel();
    }

    async function openCamera() {
      try {
        cameraStatus.textContent = 'Google Driveへ接続中...';
        const token = await getGoogleAccessTokenWithConsentFallback();
        await ensureSchoolDriveFolder(token);

        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: currentFacingMode },
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            frameRate: { ideal: 15, max: 24 }
          },
          audio: true
        });

        cameraPreview.srcObject = cameraStream;
        await cameraPreview.play().catch(() => {});
        await refreshTorchCapability();
        miniCamera.classList.remove('hidden');
        openCameraBtn.classList.add('is-open');
        openCameraBtn.setAttribute('aria-label', 'カメラを閉じる');
        cameraStatus.textContent = 'カメラ起動中';
      } catch (error) {
        console.error(error);
        alert(`カメラ起動失敗: ${error.name}`);
      }
    }

    function closeCamera() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }

      torchSyncEnabled = false;
      torchPulseToken++;
      torchHoldUntil = 0;
      clearTimeout(torchPulseTimer);
      if (torchIsOn) setTorch(false);
      lastTorchFrameIndex = -1;

      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }

      torchSupported = false;
      torchIsOn = false;
      desiredTorchState = false;
      torchHoldUntil = 0;
      updateTorchButton();
      cameraPreview.srcObject = null;
      miniCamera.classList.add('hidden');
      openCameraBtn.classList.remove('is-open');
      openCameraBtn.setAttribute('aria-label', 'カメラを開く');
      recordToggleBtn.disabled = false;
      recordToggleBtn.innerHTML = '&#9679;';
      recordToggleBtn.classList.remove('is-recording');
      recordToggleBtn.setAttribute('title', '動画を撮影');
      cameraStatus.textContent = 'カメラ停止';
    }

    function getSupportedVideoType() {
      if (!window.MediaRecorder) return '';

      const types = [
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];

      for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }

      return '';
    }

    async function takePhoto() {
      if (!cameraStream) {
        alert('先にカメラを起動してください');
        return;
      }

      const w = cameraPreview.videoWidth;
      const h = cameraPreview.videoHeight;

      if (!w || !h) {
        alert('カメラ映像の取得中です。少し待ってください');
        return;
      }

      photoCanvas.width = w;
      photoCanvas.height = h;

      const ctx = photoCanvas.getContext('2d');
      ctx.drawImage(cameraPreview, 0, 0, w, h);

      photoCanvas.toBlob(async blob => {
        if (!blob) {
          alert('写真生成に失敗しました');
          return;
        }

        const fileInfo = createFileInfo('jpg', 'photo');

        try {
          await uploadBlobToGoogleDrive(blob, fileInfo, 'image/jpeg');
        } catch (error) {
          console.error(error);
          uploadStatus.textContent = `アップロード失敗: ${error.message}`;
          cameraStatus.textContent = 'アップロード失敗';
          alert(`アップロード失敗: ${error.message}`);
        }
      }, 'image/jpeg', 0.95);
    }

    function startRecord() {
      if (!cameraStream) {
        alert('先にカメラを起動してください');
        return;
      }

      if (!window.MediaRecorder) {
        alert('このブラウザはWeb録画に対応していません');
        return;
      }

      recordedChunks = [];
      currentMimeType = getSupportedVideoType();

      if (!currentMimeType) {
        alert('この端末では対応している動画形式がありません');
        return;
      }

      mediaRecorder = new MediaRecorder(cameraStream, {
        mimeType: currentMimeType,
        videoBitsPerSecond: 650000,
        audioBitsPerSecond: 64000
      });

      mediaRecorder.ondataavailable = event => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, {
          type: currentMimeType
        });

        if (blob.size === 0) {
          alert('動画データが作成されませんでした');
          return;
        }

        const ext = currentMimeType.includes('mp4') ? 'mp4' : 'webm';
        const fileInfo = createFileInfo(ext, 'video');

        try {
          await uploadVideoWithFallback(blob, fileInfo, currentMimeType);
        } catch (error) {
          console.error(error);
          uploadStatus.textContent = `アップロード失敗: ${error.message}`;
          cameraStatus.textContent = 'アップロード失敗';
          alert(`アップロード失敗: ${error.message}`);
        }
      };

      mediaRecorder.start(1000);

      recordToggleBtn.disabled = false;
      recordToggleBtn.innerHTML = '&#9632;';
      recordToggleBtn.classList.add('is-recording');
      recordToggleBtn.setAttribute('title', '録画を停止');
      cameraStatus.textContent = '録画中...';
    }

    function stopRecord() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }

      recordToggleBtn.disabled = false;
      recordToggleBtn.innerHTML = '&#9679;';
      recordToggleBtn.classList.remove('is-recording');
      recordToggleBtn.setAttribute('title', '動画を撮影');
    }

    async function switchCameraFacing() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        alert('録画中はカメラを切り替えできません');
        return;
      }

      currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';

      if (!cameraStream) {
        cameraStatus.textContent = currentFacingMode === 'environment' ? '背面カメラ' : '前面カメラ';
        return;
      }

      cameraStream.getTracks().forEach(track => track.stop());
      cameraStream = null;
      cameraPreview.srcObject = null;
      torchSyncEnabled = false;
      torchSupported = false;
      torchIsOn = false;
      desiredTorchState = false;
      torchPulseToken++;
      torchHoldUntil = 0;
      lastTorchFrameIndex = -1;
      clearTimeout(torchPulseTimer);
      updateTorchButton();

      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: currentFacingMode },
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            frameRate: { ideal: 15, max: 24 }
          },
          audio: true
        });

        cameraPreview.srcObject = cameraStream;
        await cameraPreview.play().catch(() => {});
        await refreshTorchCapability();
        cameraStatus.textContent = currentFacingMode === 'environment' ? '背面カメラ' : '前面カメラ';
      } catch (error) {
        console.error(error);
        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
        alert(`カメラ切り替え失敗: ${error.name}`);
      }
    }

    async function toggleCamera() {
      if (cameraStream || !miniCamera.classList.contains('hidden')) {
        closeCamera();
        return;
      }

      await openCamera();
    }

    function toggleRecord() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecord();
        return;
      }

      startRecord();
    }

    openCameraBtn.addEventListener('click', toggleCamera);
    takePhotoBtn.addEventListener('click', takePhoto);
    recordToggleBtn.addEventListener('click', toggleRecord);
    switchCameraBtn.addEventListener('click', switchCameraFacing);
    torchToggleBtn.addEventListener('click', toggleTorchSync);
    openGalleryBtn.addEventListener('click', () => {
      window.location.href = 'gallery.html';
    });
  </script>
