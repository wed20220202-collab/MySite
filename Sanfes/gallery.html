<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Gallery</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:," />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
  <main class="wrap explorer-wrap">
    <section class="explorer-header">
      <div>
        <h1>GALLERY</h1>
        <p class="version-badge page-version">v0.9.0-unified-studio</p>
        <p class="muted">Festival Drive Explorer</p>
        <p id="galleryStudentId" class="gallery-id-pill">ID: guest</p>
      </div>
      <a class="btn" href="index.html">Camera</a>
    </section>

    <section class="explorer-shell">
      <aside class="explorer-sidebar" aria-label="Gallery filters">
        <p class="sidebar-label">Drive views</p>
        <button id="filterMine" class="explorer-nav-item primary" type="button">
          <span class="nav-icon image-icon"><img src="assets/gallery/me.png" alt=""></span>
          <span>自分の写真</span>
        </button>
        <button id="filterSchool" class="explorer-nav-item" type="button">
          <span class="nav-icon image-icon"><img src="assets/gallery/school.png" alt=""></span>
          <span>学校内</span>
        </button>
        <button id="filterCampus" class="explorer-nav-item" type="button">
          <span class="nav-icon image-icon"><img src="assets/gallery/campus.png" alt=""></span>
          <span>学園内</span>
        </button>
      </aside>

      <section class="explorer-content">
        <div class="explorer-commandbar">
          <p id="status" class="status">読み込み中...</p>
          <div class="explorer-actions">
            <button id="reload" type="button">再読み込み</button>
            <button id="downloadSelected" type="button">選択を一括DL</button>
          </div>
        </div>
        <div id="gallery" class="gallery-grid explorer-file-grid"></div>
      </section>
    </section>
  </main>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzhFYYH2Rzhgw0WlZGWl_Zi5M3Dg00-FCKJVbSFQD-wCfyc66xAfFdSUQFQmDNu3sBxew/exec";
    const GOOGLE_CLIENT_ID = "819550776861-btle4ghnr6lb560p3oua2akksiuvbm3o.apps.googleusercontent.com";
    const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly";

    const status = document.getElementById("status");
    const gallery = document.getElementById("gallery");
    const reloadBtn = document.getElementById("reload");
    const downloadSelectedBtn = document.getElementById("downloadSelected");
    const filterMineBtn = document.getElementById("filterMine");
    const filterSchoolBtn = document.getElementById("filterSchool");
    const filterCampusBtn = document.getElementById("filterCampus");

    let uploads = [];
    let activeFilter = "mine";
    let selectedIds = new Set();
    let accessToken = "";
    let tokenClient = null;

    function getCurrentStudentId() {
      return localStorage.getItem("festival_student_id") || "";
    }

    function getSchoolCode(studentId = getCurrentStudentId()) {
      const match = String(studentId).match(/^[^-]+-([a-zA-Z]+)/);
      return match ? match[1].toUpperCase() : "UNKNOWN";
    }

    function getCampusCode(studentId = getCurrentStudentId()) {
      const match = String(studentId).match(/^([a-zA-Z]+)/);
      return match ? match[1].toUpperCase() : "VGA";
    }

    function getItemId(item) {
      return item.driveFileId || item.fileName || `${item.studentId}_${item.fileNo}`;
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatSize(size) {
      const n = Number(size || 0);
      if (n >= 1024 * 1024 * 1024) return (n / 1024 / 1024 / 1024).toFixed(2) + " GB";
      if (n >= 1024 * 1024) return (n / 1024 / 1024).toFixed(2) + " MB";
      if (n >= 1024) return (n / 1024).toFixed(1) + " KB";
      return n + " B";
    }

    function isDeleted(item) {
      return item.deleted === true || String(item.deleted).toLowerCase() === "true";
    }

    function isLikedByMe(item) {
      const me = getCurrentStudentId();
      const likedBy = String(item.likedBy || "");
      return likedBy.split(",").map(v => v.trim()).includes(me);
    }

    function shouldHideIdentity(item) {
      if (activeFilter === "mine") return false;

      const fileName = String(item.fileName || "").toLowerCase();
      const mimeType = String(item.mimeType || "").toLowerCase();
      const type = String(item.type || "").toLowerCase();

      return type === "photo"
        || mimeType.startsWith("image/")
        || fileName.endsWith(".jpg")
        || fileName.endsWith(".jpeg");
    }

    function getDisplayName(item) {
      if (!shouldHideIdentity(item)) {
        return item.fileName || "no-name";
      }

      return activeFilter === "school" ? "学校内の写真" : "学園内の写真";
    }

    function filterUploads() {
      const me = getCurrentStudentId();
      const mySchool = getSchoolCode(me);
      const myCampus = getCampusCode(me);

      return uploads.filter(item => {
        if (isDeleted(item)) return false;
        const studentId = String(item.studentId || "");
        const schoolCode = String(item.schoolCode || getSchoolCode(studentId)).toUpperCase();
        const campusCode = getCampusCode(studentId);

        if (activeFilter === "mine") return studentId === me;
        if (activeFilter === "school") return schoolCode === mySchool;
        return campusCode === myCampus;
      });
    }

    function setActiveFilter(nextFilter) {
      activeFilter = nextFilter;
      [filterMineBtn, filterSchoolBtn, filterCampusBtn].forEach(btn => btn.classList.remove("primary"));
      if (nextFilter === "mine") filterMineBtn.classList.add("primary");
      if (nextFilter === "school") filterSchoolBtn.classList.add("primary");
      if (nextFilter === "campus") filterCampusBtn.classList.add("primary");
      renderGallery();
    }

    function createCard(item) {
      const id = getItemId(item);
      const type = String(item.type || "");
      const isPhoto = type === "photo" || String(item.mimeType || "").startsWith("image/");
      const isVideo = type === "video" || String(item.mimeType || "").startsWith("video/");
      const url = item.driveUrl || item.downloadURL || "";
      const storageVideoUrl = isVideo && item.storagePath && item.downloadURL ? item.downloadURL : "";
      const previewUrl = item.thumbnailLink || item.thumbnailUrl || url;
      const canDelete = String(item.studentId || "") === getCurrentStudentId();
      const likes = Number(item.likes || 0);
      const liked = isLikedByMe(item);
      const hideIdentity = shouldHideIdentity(item);
      const displayName = getDisplayName(item);

      const card = document.createElement("article");
      card.className = "gallery-card";
      card.dataset.id = id;

      let preview = "";
      if (isPhoto && item.driveFileId) {
        preview = `<img class="gallery-preview drive-private-image" data-drive-file-id="${escapeHtml(item.driveFileId)}" alt="${escapeHtml(displayName)}" loading="lazy">`;
      } else if (isPhoto && previewUrl) {
        preview = `<img class="gallery-preview" src="${escapeHtml(previewUrl)}" alt="${escapeHtml(displayName)}" loading="lazy">`;
      } else if (storageVideoUrl) {
        preview = `<video class="gallery-preview gallery-video-preview" src="${escapeHtml(storageVideoUrl)}" controls preload="metadata" playsinline></video>`;
      } else if (isVideo) {
        preview = `<div class="gallery-video-placeholder">VIDEO</div>`;
      } else {
        preview = `<div class="gallery-video-placeholder">FILE</div>`;
      }

      card.innerHTML = `
        <label class="gallery-select">
          <input type="checkbox" ${selectedIds.has(id) ? "checked" : ""} data-action="select">
        </label>
        ${preview}
        <div class="gallery-info">
          <b>${escapeHtml(displayName)}</b>
          <p class="muted">School: ${escapeHtml(item.schoolCode || getSchoolCode(item.studentId))}</p>
          ${hideIdentity ? '<p class="muted">ID: 非表示</p>' : `<p class="muted">ID: ${escapeHtml(item.studentId || "")}</p>`}
          <p class="muted">${escapeHtml(item.createdAt || "")}</p>
          <p class="muted">${escapeHtml(type)} / ${formatSize(item.size)}</p>
          <div class="gallery-actions compact-actions">
            <button class="btn small heart-btn ${liked ? "liked" : ""}" type="button" data-action="like" aria-pressed="${liked ? "true" : "false"}">💛 ${likes}</button>
            <a class="btn small" href="${escapeHtml(url)}" target="_blank" rel="noopener">開く</a>
            ${canDelete ? '<button class="btn small danger" type="button" data-action="delete">削除</button>' : ""}
          </div>
        </div>
      `;

      card.addEventListener("change", event => {
        if (event.target.dataset.action !== "select") return;
        if (event.target.checked) selectedIds.add(id);
        else selectedIds.delete(id);
        updateDownloadButton();
      });

      card.addEventListener("click", event => {
        const action = event.target.dataset.action;
        if (action === "like") toggleLike(item, event.target);
        if (action === "delete") deleteOwnItem(item);
      });

      return card;
    }

    function renderGallery() {
      const items = filterUploads();
      gallery.innerHTML = "";

      if (!items.length) {
        status.textContent = "表示できる投稿がありません";
        updateDownloadButton();
        return;
      }

      items.forEach(item => gallery.appendChild(createCard(item)));
      status.textContent = `${items.length}件表示中 / ${activeFilter}`;
      updateDownloadButton();
      hydratePrivateThumbnails();
    }

    function updateDownloadButton() {
      downloadSelectedBtn.textContent = `選択を一括DL (${selectedIds.size})`;
      downloadSelectedBtn.disabled = selectedIds.size === 0;
    }

    async function postGas(payload) {
      const res = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if (!result.success) throw new Error(result.message || "GAS request failed");
      return result;
    }

    async function waitForGoogleIdentity() {
      const startedAt = Date.now();
      while (!window.google?.accounts?.oauth2) {
        if (Date.now() - startedAt > 10000) throw new Error("Google認証ライブラリを読み込めません");
        await new Promise(resolve => setTimeout(resolve, 100));
      }
    }

    async function getDriveAccessToken() {
      await waitForGoogleIdentity();
      if (accessToken) return accessToken;

      return new Promise((resolve, reject) => {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: DRIVE_SCOPE,
          hint: getCurrentStudentId() ? `${getCurrentStudentId()}@sankogakuen.jp` : undefined,
          callback: response => {
            if (response.error) {
              reject(new Error(response.error));
              return;
            }
            accessToken = response.access_token;
            resolve(accessToken);
          }
        });
        tokenClient.requestAccessToken({ prompt: "" });
      });
    }

    async function loadAuthenticatedDriveImage(img) {
      if (img.dataset.loading === "true" || img.dataset.loaded === "true") return;

      img.dataset.loading = "true";

      try {
        const token = await getDriveAccessToken();
        const fileId = img.dataset.driveFileId;
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(fileId)}?alt=media&supportsAllDrives=true`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const objectUrl = URL.createObjectURL(await res.blob());
        img.src = objectUrl;
        img.dataset.loaded = "true";
      } catch (error) {
        console.warn("thumbnail load failed", error);
        img.classList.add("is-unavailable");
        img.alt = "画像を表示できません";
      } finally {
        img.dataset.loading = "false";
      }
    }

    function hydratePrivateThumbnails() {
      const images = Array.from(gallery.querySelectorAll("img.drive-private-image[data-drive-file-id]:not([data-loaded='true'])"));
      if (!images.length) return;

      if (!("IntersectionObserver" in window)) {
        images.forEach(img => loadAuthenticatedDriveImage(img));
        return;
      }

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (!entry.isIntersecting) return;
          observer.unobserve(entry.target);
          loadAuthenticatedDriveImage(entry.target);
        });
      }, { rootMargin: "240px" });

      images.forEach(img => observer.observe(img));
    }

    function setLikedByMe(item, liked, studentId) {
      const users = String(item.likedBy || "")
        .split(",")
        .map(v => v.trim())
        .filter(Boolean);
      const index = users.indexOf(studentId);

      if (liked && index === -1) users.push(studentId);
      if (!liked && index !== -1) users.splice(index, 1);

      item.likedBy = users.join(",");
      item.likes = users.length;
    }

    async function toggleLike(item, button) {
      const studentId = getCurrentStudentId();
      if (!studentId) {
        alert("先にindex.htmlでログインしてください");
        return;
      }

      const wasLiked = isLikedByMe(item);
      const previousLikes = Number(item.likes || 0);
      const nextLiked = !wasLiked;
      const optimisticLikes = Math.max(0, previousLikes + (nextLiked ? 1 : -1));

      button.disabled = true;
      button.classList.toggle("liked", nextLiked);
      button.setAttribute("aria-pressed", nextLiked ? "true" : "false");
      button.textContent = `💛 ${optimisticLikes}`;
      setLikedByMe(item, nextLiked, studentId);

      try {
        const result = await postGas({
          mode: "toggleLike",
          driveFileId: item.driveFileId,
          fileName: item.fileName,
          studentId
        });

        const confirmedLiked = Boolean(result.liked);
        const confirmedLikes = Number(result.likes ?? item.likes ?? optimisticLikes);
        setLikedByMe(item, confirmedLiked, studentId);
        item.likes = confirmedLikes;
        button.classList.toggle("liked", confirmedLiked);
        button.setAttribute("aria-pressed", confirmedLiked ? "true" : "false");
        button.textContent = `💛 ${confirmedLikes}`;
      } catch (error) {
        console.error(error);
        setLikedByMe(item, wasLiked, studentId);
        item.likes = previousLikes;
        button.classList.toggle("liked", wasLiked);
        button.setAttribute("aria-pressed", wasLiked ? "true" : "false");
        button.textContent = `💛 ${previousLikes}`;
        alert(`いいね更新失敗: ${error.message}`);
      } finally {
        button.disabled = false;
      }
    }

    async function deleteOwnItem(item) {
      if (String(item.studentId || "") !== getCurrentStudentId()) return;
      if (!confirm(`${item.fileName} を削除しますか？`)) return;

      const token = await getDriveAccessToken();

      if (item.driveFileId) {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(item.driveFileId)}?supportsAllDrives=true`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok && res.status !== 404) throw new Error(await res.text());
      }

      await postGas({
        mode: "deleteUpload",
        driveFileId: item.driveFileId,
        fileName: item.fileName,
        studentId: getCurrentStudentId()
      });

      selectedIds.delete(getItemId(item));
      await loadGallery();
    }

    async function downloadSelected() {
      const items = filterUploads().filter(item => selectedIds.has(getItemId(item)));
      if (!items.length) return;

      const zip = new JSZip();
      status.textContent = `一括ダウンロード準備中... 0/${items.length}`;
      let token = "";

      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const directUrl = item.downloadURL || "";
        let res = null;

        status.textContent = `一括ダウンロード準備中... ${i + 1}/${items.length}`;

        if (item.driveFileId) {
          token ||= await getDriveAccessToken();
          res = await fetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(item.driveFileId)}?alt=media&supportsAllDrives=true`, {
            headers: { Authorization: `Bearer ${token}` }
          });
        } else if (directUrl) {
          res = await fetch(directUrl);
        } else {
          continue;
        }

        if (!res.ok) {
          console.warn("download failed", item.fileName, await res.text());
          continue;
        }

        zip.file(item.fileName || `${item.driveFileId}.bin`, await res.blob());
      }

      const zipBlob = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `festival-gallery-${activeFilter}.zip`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      status.textContent = `${items.length}件の一括ダウンロードを開始しました`;
    }

    async function loadGallery() {
      status.textContent = "読み込み中...";
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        if (!data.success) throw new Error(data.message || "読み込み失敗");
        uploads = data.uploads || [];
        renderGallery();
      } catch (error) {
        console.error(error);
        status.textContent = `読み込み失敗: ${error.message}`;
      }
    }

    filterMineBtn.addEventListener("click", () => setActiveFilter("mine"));
    filterSchoolBtn.addEventListener("click", () => setActiveFilter("school"));
    filterCampusBtn.addEventListener("click", () => setActiveFilter("campus"));
    reloadBtn.addEventListener("click", loadGallery);
    downloadSelectedBtn.addEventListener("click", downloadSelected);

    loadGallery();
  </script>
  <script type="module">
    import { setPagePresence } from './realtime.js';

    const studentId = localStorage.getItem("festival_student_id") || "guest";
    const idLabel = document.getElementById("galleryStudentId");

    if (idLabel) {
      idLabel.textContent = `ID: ${studentId}`;
    }

    setPagePresence("gallery", studentId);
  </script>
</body>
</html>
