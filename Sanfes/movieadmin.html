<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Sequence Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="wrap movie-admin">
    <header class="app-topbar">
      <div>
        <p class="page-kicker">SEQUENCE MANAGER</p>
        <h1>MOVIE ADMIN</h1>
        <p class="version-badge page-version">v0.8.0-sequence-admin</p>
        <p class="muted">カラーシーケンスの名前変更、編集、複製、削除を行います。</p>
      </div>
      <nav class="app-nav">
        <a class="btn" href="movie.html">作成画面</a>
        <a class="btn" href="admin.html">管理画面</a>
        <a class="btn" href="index.html">参加者画面</a>
      </nav>
    </header>

    <section class="sequence-admin-grid">
      <article class="panel sequence-admin-list-panel">
        <div class="panel-heading">
          <div>
            <h2>保存済みシーケンス</h2>
            <p class="muted">編集したいシーケンスを選択します。</p>
          </div>
          <button id="reload" type="button">再読み込み</button>
        </div>
        <div id="sequenceList" class="sequence-admin-list"></div>
      </article>

      <article class="panel sequence-admin-editor-panel">
        <div class="panel-heading">
          <div>
            <h2>編集</h2>
            <p id="editorStatus" class="muted">シーケンスを選択してください。</p>
          </div>
        </div>

        <div id="emptyEditor" class="empty-editor">
          <p class="muted">左の一覧から編集するシーケンスを選択します。</p>
        </div>

        <form id="editorForm" class="sequence-editor hidden">
          <div class="field-grid two-col">
            <label>
              <span>名前</span>
              <input id="sequenceName" type="text" />
            </label>
            <label>
              <span>間隔 秒</span>
              <input id="sequenceInterval" type="number" min="0.1" step="0.1" />
            </label>
            <label>
              <span>再生時間 秒</span>
              <input id="sequenceDuration" type="number" min="0" step="0.1" />
            </label>
            <label>
              <span>フレーム数</span>
              <input id="frameCount" type="text" disabled />
            </label>
          </div>

          <div class="studio-actions">
            <button id="saveSequence" class="primary" type="submit">保存</button>
            <button id="duplicateSequence" type="button">複製</button>
            <button id="addFrame" type="button">フレーム追加</button>
            <button id="deleteSequence" class="danger" type="button">削除</button>
          </div>

          <div class="frame-editor">
            <div class="frame-editor-head">
              <span>時間</span>
              <span>色</span>
              <span>操作</span>
            </div>
            <div id="frameRows" class="frame-rows"></div>
          </div>
        </form>
      </article>
    </section>
  </main>

  <script type="module">
    import {
      getSequences,
      saveSequence as persistSequence,
      deleteSequence as removeSequence,
      setPagePresence
    } from './realtime.js';

    const sequenceList = document.getElementById('sequenceList');
    const reloadBtn = document.getElementById('reload');
    const editorStatus = document.getElementById('editorStatus');
    const emptyEditor = document.getElementById('emptyEditor');
    const editorForm = document.getElementById('editorForm');
    const sequenceName = document.getElementById('sequenceName');
    const sequenceInterval = document.getElementById('sequenceInterval');
    const sequenceDuration = document.getElementById('sequenceDuration');
    const frameCount = document.getElementById('frameCount');
    const frameRows = document.getElementById('frameRows');
    const duplicateBtn = document.getElementById('duplicateSequence');
    const addFrameBtn = document.getElementById('addFrame');
    const deleteBtn = document.getElementById('deleteSequence');

    let sequences = [];
    let selected = null;

    setPagePresence('movieadmin', localStorage.getItem('festival_student_id') || 'admin');

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeFrame(frame, index) {
      return {
        time: Number(frame?.time ?? index * Number(sequenceInterval.value || 0.2)),
        color: frame?.color || '#000000'
      };
    }

    function getFormSequence() {
      const frames = Array.from(frameRows.querySelectorAll('.frame-row'))
        .map(row => ({
          time: Number(row.querySelector('[data-field="time"]').value || 0),
          color: row.querySelector('[data-field="color"]').value || '#000000'
        }))
        .sort((a, b) => a.time - b.time);

      return {
        ...selected,
        name: sequenceName.value.trim() || 'untitled-sequence',
        interval: Number(sequenceInterval.value || 0.2),
        duration: Number(sequenceDuration.value || (frames.at(-1)?.time || 0)),
        frames
      };
    }

    function renderList() {
      sequenceList.innerHTML = '';

      if (!sequences.length) {
        sequenceList.innerHTML = '<p class="muted empty-state">保存済みシーケンスはありません。</p>';
        return;
      }

      sequences.forEach(seq => {
        const row = document.createElement('div');
        row.className = `sequence-row sequence-admin-item ${selected?.id === seq.id ? 'is-selected' : ''}`;
        row.innerHTML = `
          <div class="sequence-meta">
            <b>${escapeHtml(seq.name || 'untitled-sequence')}</b>
            <span>${seq.frames?.length || 0}フレーム / ${Number(seq.duration || 0).toFixed(1)}秒</span>
          </div>
          <button type="button">編集</button>
        `;

        row.querySelector('button').addEventListener('click', () => selectSequence(seq.id));
        sequenceList.appendChild(row);
      });
    }

    function renderFrames(frames) {
      frameRows.innerHTML = '';

      frames.map(normalizeFrame).forEach((frame, index) => {
        const row = document.createElement('div');
        row.className = 'frame-row';
        row.innerHTML = `
          <input data-field="time" type="number" min="0" step="0.1" value="${Number(frame.time).toFixed(1)}">
          <input data-field="color" type="color" value="${escapeHtml(frame.color)}">
          <button class="danger" type="button" data-action="remove">削除</button>
        `;

        row.querySelector('[data-action="remove"]').addEventListener('click', () => {
          row.remove();
          updateFrameCount();
        });

        frameRows.appendChild(row);
      });

      updateFrameCount();
    }

    function updateFrameCount() {
      frameCount.value = `${frameRows.querySelectorAll('.frame-row').length}フレーム`;
    }

    function selectSequence(id) {
      selected = sequences.find(seq => seq.id === id) || null;

      if (!selected) return;

      emptyEditor.classList.add('hidden');
      editorForm.classList.remove('hidden');
      editorStatus.textContent = `編集中: ${selected.name || selected.id}`;
      sequenceName.value = selected.name || '';
      sequenceInterval.value = selected.interval || 0.2;
      sequenceDuration.value = selected.duration || selected.frames?.at(-1)?.time || 0;
      renderFrames(selected.frames || []);
      renderList();
    }

    async function loadSequences() {
      editorStatus.textContent = '読み込み中...';
      sequences = await getSequences();
      sequences.sort((a, b) => Number(b.updatedAt || b.createdAt || 0) - Number(a.updatedAt || a.createdAt || 0));
      renderList();

      if (selected) {
        const exists = sequences.some(seq => seq.id === selected.id);
        if (exists) selectSequence(selected.id);
        else selected = null;
      }

      if (!selected) {
        editorStatus.textContent = 'シーケンスを選択してください。';
        emptyEditor.classList.remove('hidden');
        editorForm.classList.add('hidden');
      }
    }

    editorForm.addEventListener('submit', async event => {
      event.preventDefault();
      if (!selected) return;

      const saved = await persistSequence(getFormSequence());
      selected = saved;
      editorStatus.textContent = `保存しました: ${saved.name}`;
      await loadSequences();
    });

    duplicateBtn.addEventListener('click', async () => {
      if (!selected) return;

      const source = getFormSequence();
      const copy = {
        ...source,
        id: undefined,
        name: `${source.name} copy`,
        createdAt: undefined,
        updatedAt: undefined,
        frames: source.frames.map(frame => ({ ...frame }))
      };

      const saved = await persistSequence(copy);
      selected = saved;
      editorStatus.textContent = `複製しました: ${saved.name}`;
      await loadSequences();
      selectSequence(saved.id);
    });

    addFrameBtn.addEventListener('click', () => {
      const interval = Number(sequenceInterval.value || 0.2);
      const lastTime = Array.from(frameRows.querySelectorAll('[data-field="time"]'))
        .map(input => Number(input.value || 0))
        .sort((a, b) => a - b)
        .at(-1) || 0;

      renderFrames([
        ...getFormSequence().frames,
        { time: lastTime + interval, color: '#ffffff' }
      ]);
    });

    deleteBtn.addEventListener('click', async () => {
      if (!selected) return;
      if (!confirm(`${selected.name || selected.id} を削除しますか？`)) return;

      await removeSequence(selected.id);
      selected = null;
      await loadSequences();
    });

    reloadBtn.addEventListener('click', loadSequences);
    loadSequences();
  </script>
</body>

</html>
