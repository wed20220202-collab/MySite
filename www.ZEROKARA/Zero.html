<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゼロカラ</title>

    <!-- Google Fonts の Epilogue を読み込む -->
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            text-align: center;
            font-family: 'Epilogue', sans-serif;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        .bg-image {
            width: 100%;
            /* 画像Aのサイズに合わせる */
        }

        #realtime {
            position: absolute;
            top: 29.7%;
            /* 数字の表示位置を調整 */
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.6rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            /* 数字の幅を統一 */
            color: white;
            /* 文字色を適宜変更 */
            background: rgba(0, 0, 0, 0);
            /* 透明度を追加して視認性向上 */
            padding: 5px 10px;
            border-radius: 5px;
        }

        .hit-area {
            position: relative;
            left: 287px;
            top: 258px;
            width: 73px;
            height: 31px;
            cursor: pointer;
            z-index: 9999;
            /* 確認用 */
            background: rgba(255, 0, 0, 0.3);
        }
    </style>

    <script>
        function showClock() {
            let nowTime = new Date();
            let nowHour = nowTime.getHours().toString().padStart(2, '0'); // 2桁表示
            let nowMin = nowTime.getMinutes().toString().padStart(2, '0');
            let nowSec = nowTime.getSeconds().toString().padStart(2, '0');
            let nowMilli = Math.floor(nowTime.getMilliseconds() / 100); // 0〜9の値

            let msg = nowHour + ":" + nowMin + ":" + nowSec + "." + nowMilli;
            document.getElementById("realtime").innerHTML = msg;
        }
        setInterval(showClock, 100); // 100msごとに更新
        window.onload = showClock;

        let isImage1118 = true;

        function changeImage() {
            const img = document.getElementById("mainImage");

            if (isImage1118) {
                img.src = "./IMG_1117.PNG";
            } else {
                img.src = "./IMG_1118.PNG";
            }

            isImage1118 = !isImage1118;
        }
    </script>
</head>

<body>
    <div class="hit-area" onclick="location.href='next.html'"></div>
    <div class="container">
        <img id="mainImage" src="./IMG_1118.PNG" class="bg-image">

        <button class="hit-area" onclick="changeImage()"></button>

        <p id="realtime">--:--:--.-</p>
    </div>
</body>

</html>
