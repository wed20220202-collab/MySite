<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Color</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:," />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="colorStage"></div>

  <div id="loginPanel" class="login-panel">
    <h1>San Festival</h1>
    <p>学校アカウントでログインしてください</p>
    <button id="loginBtn">Googleでログイン</button>
    <p id="loginMessage"></p>
  </div>

  <div id="mainPanel" class="participant-ui hidden">
    <h1>FESTIVAL COLOR</h1>
    <p id="studentIdText">未ログイン</p>
    <p id="status">受信待機中...</p>
    <p id="colorText">#000000</p>
    <p id="uploadStatus">アップロード待機中</p>
    <button id="logoutBtn">ログアウト</button>
  </div>

  <button id="openCamera" class="camera-fab hidden">📷</button>

  <div id="miniCamera" class="mini-camera hidden">
    <video id="cameraPreview" autoplay playsinline muted></video>

    <div class="mini-controls">
      <button id="takePhoto" type="button" title="写真を撮影">&#128248;</button>
      <button id="recordToggle" class="record-toggle" type="button" title="動画を撮影">&#9679;</button>
      <button id="openGallery" type="button" title="ギャラリーを開く">&#128444;</button>
    </div>

    <p id="cameraStatus">カメラ待機中</p>
    <canvas id="photoCanvas" style="display:none;"></canvas>
  </div>

  <script type="module">
    import { watchActiveSession } from './realtime.js';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const GOOGLE_CLIENT_ID = "819550776861-btle4ghnr6lb560p3oua2akksiuvbm3o.apps.googleusercontent.com";
    const GOOGLE_DRIVE_FOLDER_ID = "1r7rKCri1my5jNO2OMV_4G3B9gos8kSAG";
    const GOOGLE_DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6KJmefD4H6lFrIPUXyuiDNEnsEGXTaK4KJ3hY0tu0HszVVbgzlki8jtxiJI4VW4bJcg/exec";
    const CHUNK_SIZE = 2 * 1024 * 1024;

    const firebaseConfig = {
      apiKey: "AIzaSyC7oudfhfJC7zssUb0KR98tFy_lxvVT0bI",
      authDomain: "sanfestival-7a016.firebaseapp.com",
      databaseURL: "https://sanfestival-7a016-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sanfestival-7a016",
      storageBucket: "sanfestival-7a016.firebasestorage.app",
      messagingSenderId: "819550776861",
      appId: "1:819550776861:web:f38613132aef5bc3c7e0f4",
      measurementId: "G-516PDY0SYD"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ hd: "sankogakuen.jp" });

    const stage = document.getElementById('colorStage');
    const loginPanel = document.getElementById('loginPanel');
    const mainPanel = document.getElementById('mainPanel');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginMessage = document.getElementById('loginMessage');
    const studentIdText = document.getElementById('studentIdText');
    const status = document.getElementById('status');
    const colorText = document.getElementById('colorText');
    const uploadStatus = document.getElementById('uploadStatus');

    const openCameraBtn = document.getElementById('openCamera');
    const miniCamera = document.getElementById('miniCamera');
    const cameraPreview = document.getElementById('cameraPreview');
    const photoCanvas = document.getElementById('photoCanvas');
    const takePhotoBtn = document.getElementById('takePhoto');
    const recordToggleBtn = document.getElementById('recordToggle');
    const openGalleryBtn = document.getElementById('openGallery');
    const cameraStatus = document.getElementById('cameraStatus');

    let cameraStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let currentMimeType = '';
    let tokenClient = null;
    let accessToken = '';
    let schoolFolderId = '';

    loginBtn.addEventListener('click', async () => {
      loginMessage.textContent = 'ログイン中...';
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error(error);
        loginMessage.textContent = 'ログインに失敗しました';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      accessToken = '';
      await signOut(auth);
    });

    onAuthStateChanged(auth, async user => {
      if (!user) {
        localStorage.removeItem('festival_student_id');
        loginPanel.classList.remove('hidden');
        mainPanel.classList.add('hidden');
        openCameraBtn.classList.add('hidden');
        closeCamera();
        return;
      }

      const email = user.email || '';

      if (!email.endsWith('@sankogakuen.jp')) {
        alert('学校アカウント（sankogakuen.jp）でログインしてください');
        await signOut(auth);
        return;
      }

      const studentId = email.split('@')[0];
      localStorage.setItem('festival_student_id', studentId);

      studentIdText.textContent = `ID: ${studentId}`;
      loginPanel.classList.add('hidden');
      mainPanel.classList.remove('hidden');
      openCameraBtn.classList.remove('hidden');
      loginMessage.textContent = '';
    });

    function applyColor(session) {
      if (!session || !session.color) return;

      const color = session.color;
      stage.style.background = color;
      document.body.style.background = color;
      colorText.textContent = color;

      status.textContent = session.isPlaying
        ? `受信中: ${session.sequenceName || 'manual'}`
        : '停止中';
    }

    watchActiveSession(applyColor);

    function getStudentId() {
      return localStorage.getItem('festival_student_id') || 'guest';
    }

    function getNextFileNumber() {
      const key = `festival_file_count_${getStudentId()}`;
      let count = Number(localStorage.getItem(key) || '0');
      count++;
      localStorage.setItem(key, String(count));
      return String(count).padStart(3, '0');
    }

    function createFileInfo(ext, type) {
      const studentId = getStudentId();
      const fileNo = getNextFileNumber();
      const fileName = `${studentId}_${fileNo}.${ext}`;

      return { studentId, fileNo, fileName, type };
    }

    async function saveUploadLogToSpreadsheet(data) {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          mode: 'recordUrl',
          ...data
        })
      });

      const result = await res.json();

      if (!result.success) {
        throw new Error(result.message || 'Spreadsheetログ保存に失敗しました');
      }

      return result;
    }

    function assertDriveSettings() {
      if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.includes('ここに')) {
        throw new Error('GOOGLE_CLIENT_IDが未設定です');
      }

      if (!GOOGLE_DRIVE_FOLDER_ID || GOOGLE_DRIVE_FOLDER_ID.includes('ここに')) {
        throw new Error('GOOGLE_DRIVE_FOLDER_IDが未設定です');
      }
    }

    function waitForGoogleIdentity() {
      return new Promise((resolve, reject) => {
        const startedAt = Date.now();

        const timerId = setInterval(() => {
          if (window.google?.accounts?.oauth2) {
            clearInterval(timerId);
            resolve();
            return;
          }

          if (Date.now() - startedAt > 10000) {
            clearInterval(timerId);
            reject(new Error('Google認証ライブラリの読み込みに失敗しました'));
          }
        }, 100);
      });
    }

    async function getGoogleAccessToken(options = {}) {
      assertDriveSettings();
      await waitForGoogleIdentity();

      if (accessToken) return accessToken;

      return new Promise((resolve, reject) => {
        const timeoutId = setTimeout(() => {
          reject(new Error('Google Driveの認証が完了しませんでした。ポップアップ許可とOAuth設定を確認してください'));
        }, 10000);

        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: GOOGLE_DRIVE_SCOPE,
          hint: auth.currentUser?.email || undefined,
          callback: response => {
            clearTimeout(timeoutId);

            if (response.error) {
              reject(new Error(response.error));
              return;
            }

            accessToken = response.access_token;
            resolve(accessToken);
          }
        });

        tokenClient.requestAccessToken({
          prompt: options.prompt || 'consent'
        });
      });
    }

    async function refreshGoogleAccessToken() {
      accessToken = '';
      return getGoogleAccessToken({ prompt: '' });
    }

    function escapeDriveQueryValue(value) {
      return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function getSchoolFolderName() {
      const studentId = getStudentId();
      const match = studentId.match(/^[^-]+-([a-zA-Z]+)/);
      return match ? match[1].toUpperCase() : 'UNKNOWN';
    }

    async function ensureSchoolDriveFolder(token) {
      const folderName = getSchoolFolderName();
      const cacheKey = `festival_drive_school_folder_${folderName}`;
      const cachedFolderId = schoolFolderId || localStorage.getItem(cacheKey);

      if (cachedFolderId) {
        schoolFolderId = cachedFolderId;
        return cachedFolderId;
      }

      cameraStatus.textContent = `学校フォルダ確認中...${folderName}`;

      const escapedName = escapeDriveQueryValue(folderName);
      const escapedParent = escapeDriveQueryValue(GOOGLE_DRIVE_FOLDER_ID);
      const query = [
        "mimeType='application/vnd.google-apps.folder'",
        `name='${escapedName}'`,
        `'${escapedParent}' in parents`,
        'trashed=false'
      ].join(' and ');

      const searchUrl = [
        'https://www.googleapis.com/drive/v3/files',
        '?supportsAllDrives=true',
        '&includeItemsFromAllDrives=true',
        '&spaces=drive',
        '&fields=files(id,name)',
        `&q=${encodeURIComponent(query)}`
      ].join('');

      const searchRes = await fetch(searchUrl, {
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      if (searchRes.status === 401) {
        const newToken = await refreshGoogleAccessToken();
        return ensureSchoolDriveFolder(newToken);
      }

      if (!searchRes.ok) {
        throw new Error(await searchRes.text());
      }

      const searchResult = await searchRes.json();
      const existingFolder = searchResult.files?.[0];

      if (existingFolder?.id) {
        schoolFolderId = existingFolder.id;
        localStorage.setItem(cacheKey, existingFolder.id);
        return existingFolder.id;
      }

      cameraStatus.textContent = `学校フォルダ作成中...${folderName}`;

      const createRes = await fetch('https://www.googleapis.com/drive/v3/files?supportsAllDrives=true&fields=id,name', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json; charset=UTF-8'
        },
        body: JSON.stringify({
          name: folderName,
          mimeType: 'application/vnd.google-apps.folder',
          parents: [GOOGLE_DRIVE_FOLDER_ID]
        })
      });

      if (createRes.status === 401) {
        const newToken = await refreshGoogleAccessToken();
        return ensureSchoolDriveFolder(newToken);
      }

      if (!createRes.ok) {
        throw new Error(await createRes.text());
      }

      const createdFolder = await createRes.json();
      schoolFolderId = createdFolder.id;
      localStorage.setItem(cacheKey, createdFolder.id);
      return createdFolder.id;
    }

    async function startDriveResumableSession(blob, fileInfo, mimeType, token, parentFolderId) {
      const metadata = {
        name: fileInfo.fileName,
        mimeType,
        parents: [parentFolderId],
        description: JSON.stringify({
          studentId: fileInfo.studentId,
          fileNo: fileInfo.fileNo,
          type: fileInfo.type,
          createdAt: new Date().toISOString()
        })
      };

      const url = [
        'https://www.googleapis.com/upload/drive/v3/files',
        '?uploadType=resumable',
        '&supportsAllDrives=true',
        '&fields=id,name,mimeType,size,webViewLink,webContentLink,thumbnailLink'
      ].join('');

      const res = await fetch(url, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json; charset=UTF-8',
          'X-Upload-Content-Type': mimeType,
          'X-Upload-Content-Length': String(blob.size)
        },
        body: JSON.stringify(metadata)
      });

      if (res.status === 401) {
        const newToken = await refreshGoogleAccessToken();
        return startDriveResumableSession(blob, fileInfo, mimeType, newToken, parentFolderId);
      }

      if (!res.ok) {
        throw new Error(await res.text());
      }

      const uploadUrl = res.headers.get('Location');

      if (!uploadUrl) {
        throw new Error('DriveのアップロードURLを取得できませんでした');
      }

      return uploadUrl;
    }

    async function queryDriveUploadOffset(uploadUrl, totalSize) {
      const res = await fetch(uploadUrl, {
        method: 'PUT',
        headers: {
          'Content-Range': `bytes */${totalSize}`
        }
      });

      if (res.status === 308) {
        const range = res.headers.get('Range');
        if (!range) return 0;

        const match = range.match(/bytes=0-(\d+)/);
        return match ? Number(match[1]) + 1 : 0;
      }

      if (res.ok) return totalSize;

      throw new Error(await res.text());
    }

    async function uploadChunkWithRetry(uploadUrl, chunk, start, end, totalSize) {
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          const res = await fetch(uploadUrl, {
            method: 'PUT',
            headers: {
              'Content-Type': chunk.type || 'application/octet-stream',
              'Content-Range': `bytes ${start}-${end - 1}/${totalSize}`
            },
            body: chunk
          });

          if (res.status === 308) {
            const range = res.headers.get('Range');
            const match = range?.match(/bytes=0-(\d+)/);
            return {
              done: false,
              nextStart: match ? Number(match[1]) + 1 : end
            };
          }

          if (res.status === 200 || res.status === 201) {
            return {
              done: true,
              file: await res.json()
            };
          }

          if (res.status >= 500 || res.status === 429) {
            await sleep(800 * attempt);
            const nextStart = await queryDriveUploadOffset(uploadUrl, totalSize);
            return { done: false, nextStart };
          }

          throw new Error(await res.text());
        } catch (error) {
          if (attempt === 3) throw error;
          await sleep(800 * attempt);
        }
      }

      throw new Error('アップロードの再試行回数を超えました');
    }

    async function uploadBlobToGoogleDrive(blob, fileInfo, mimeType) {
      uploadStatus.textContent = `アップロード準備中: ${fileInfo.fileName}`;
      cameraStatus.textContent = 'Google Driveへ接続中...';

      const token = await getGoogleAccessToken();
      const parentFolderId = await ensureSchoolDriveFolder(token);
      const uploadUrl = await startDriveResumableSession(blob, fileInfo, mimeType, token, parentFolderId);
      let start = 0;

      while (start < blob.size) {
        const end = Math.min(start + CHUNK_SIZE, blob.size);
        const chunk = blob.slice(start, end, mimeType);

        const result = await uploadChunkWithRetry(uploadUrl, chunk, start, end, blob.size);

        if (result.done) {
          const link = result.file.webViewLink || `https://drive.google.com/file/d/${result.file.id}/view`;

          try {
            await saveUploadLogToSpreadsheet({
              studentId: fileInfo.studentId,
              schoolCode: getSchoolFolderName(),
              fileNo: fileInfo.fileNo,
              type: fileInfo.type,
              fileName: fileInfo.fileName,
              driveFileId: result.file.id,
              driveFolderId: parentFolderId,
              rootFolderId: GOOGLE_DRIVE_FOLDER_ID,
              driveUrl: link,
              downloadURL: link,
              thumbnailLink: result.file.thumbnailLink || '',
              mimeType,
              size: blob.size,
              createdAt: new Date().toISOString(),
              approved: true
            });
          } catch (logError) {
            console.error(logError);
            uploadStatus.textContent = `Drive保存完了 / ログ保存失敗: ${logError.message}`;
          }
          uploadStatus.innerHTML =
            `アップロード完了: <a href="${link}" target="_blank" rel="noopener">${fileInfo.fileName}</a>`;
          cameraStatus.textContent = `保存完了: ${fileInfo.fileName}`;
          return result.file;
        }

        start = result.nextStart;

        const percent = Math.min(99, Math.round((start / blob.size) * 100));
        uploadStatus.textContent = `アップロード中: ${fileInfo.fileName} / ${percent}%`;
        cameraStatus.textContent = `${percent}%`;
      }

      throw new Error('アップロード完了レスポンスを取得できませんでした');
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function openCamera() {
      try {
        cameraStatus.textContent = 'Google Driveへ接続中...';
        const token = await getGoogleAccessToken({ prompt: accessToken ? '' : 'consent' });
        await ensureSchoolDriveFolder(token);

        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 640 },
            height: { ideal: 360 },
            frameRate: { ideal: 15, max: 24 }
          },
          audio: true
        });

        cameraPreview.srcObject = cameraStream;
        miniCamera.classList.remove('hidden');
        openCameraBtn.classList.add('is-open');
        openCameraBtn.setAttribute('aria-label', 'カメラを閉じる');
        cameraStatus.textContent = 'カメラ起動中';
      } catch (error) {
        console.error(error);
        alert(`カメラ起動失敗: ${error.name}`);
      }
    }

    function closeCamera() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }

      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }

      cameraPreview.srcObject = null;
      miniCamera.classList.add('hidden');
      openCameraBtn.classList.remove('is-open');
      openCameraBtn.setAttribute('aria-label', 'カメラを開く');
      recordToggleBtn.disabled = false;
      recordToggleBtn.innerHTML = '&#9679;';
      recordToggleBtn.classList.remove('is-recording');
      recordToggleBtn.setAttribute('title', '動画を撮影');
      cameraStatus.textContent = 'カメラ停止';
    }

    function getSupportedVideoType() {
      if (!window.MediaRecorder) return '';

      const types = [
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];

      for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }

      return '';
    }

    async function takePhoto() {
      if (!cameraStream) {
        alert('先にカメラを起動してください');
        return;
      }

      const w = cameraPreview.videoWidth;
      const h = cameraPreview.videoHeight;

      if (!w || !h) {
        alert('カメラ映像の取得中です。少し待ってください');
        return;
      }

      photoCanvas.width = w;
      photoCanvas.height = h;

      const ctx = photoCanvas.getContext('2d');
      ctx.drawImage(cameraPreview, 0, 0, w, h);

      photoCanvas.toBlob(async blob => {
        if (!blob) {
          alert('写真生成に失敗しました');
          return;
        }

        const fileInfo = createFileInfo('jpg', 'photo');

        try {
          await uploadBlobToGoogleDrive(blob, fileInfo, 'image/jpeg');
        } catch (error) {
          console.error(error);
          uploadStatus.textContent = `アップロード失敗: ${error.message}`;
          cameraStatus.textContent = 'アップロード失敗';
          alert(`アップロード失敗: ${error.message}`);
        }
      }, 'image/jpeg', 0.86);
    }

    function startRecord() {
      if (!cameraStream) {
        alert('先にカメラを起動してください');
        return;
      }

      if (!window.MediaRecorder) {
        alert('このブラウザはWeb録画に対応していません');
        return;
      }

      recordedChunks = [];
      currentMimeType = getSupportedVideoType();

      if (!currentMimeType) {
        alert('この端末では対応している動画形式がありません');
        return;
      }

      mediaRecorder = new MediaRecorder(cameraStream, {
        mimeType: currentMimeType,
        videoBitsPerSecond: 900000,
        audioBitsPerSecond: 64000
      });

      mediaRecorder.ondataavailable = event => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, {
          type: currentMimeType
        });

        if (blob.size === 0) {
          alert('動画データが作成されませんでした');
          return;
        }

        const ext = currentMimeType.includes('mp4') ? 'mp4' : 'webm';
        const fileInfo = createFileInfo(ext, 'video');

        try {
          await uploadBlobToGoogleDrive(blob, fileInfo, currentMimeType);
        } catch (error) {
          console.error(error);
          uploadStatus.textContent = `アップロード失敗: ${error.message}`;
          cameraStatus.textContent = 'アップロード失敗';
          alert(`アップロード失敗: ${error.message}`);
        }
      };

      mediaRecorder.start(1000);

      recordToggleBtn.disabled = false;
      recordToggleBtn.innerHTML = '&#9632;';
      recordToggleBtn.classList.add('is-recording');
      recordToggleBtn.setAttribute('title', '録画を停止');
      cameraStatus.textContent = '録画中...';
    }

    function stopRecord() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }

      recordToggleBtn.disabled = false;
      recordToggleBtn.innerHTML = '&#9679;';
      recordToggleBtn.classList.remove('is-recording');
      recordToggleBtn.setAttribute('title', '動画を撮影');
    }

    async function toggleCamera() {
      if (cameraStream || !miniCamera.classList.contains('hidden')) {
        closeCamera();
        return;
      }

      await openCamera();
    }

    function toggleRecord() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecord();
        return;
      }

      startRecord();
    }

    openCameraBtn.addEventListener('click', toggleCamera);
    takePhotoBtn.addEventListener('click', takePhoto);
    recordToggleBtn.addEventListener('click', toggleRecord);
    openGalleryBtn.addEventListener('click', () => {
      window.location.href = 'gallery.html';
    });
  </script>
</body>
</html>
