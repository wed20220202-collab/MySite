<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Movie Color</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="wrap movie-studio">
    <header class="app-topbar">
      <div>
        <p class="page-kicker">カラースタジオ</p>
        <h1>MOVIE COLOR</h1>
        <p class="muted">動画から平均的な色を抽出し、シーケンスとして保存します。</p>
      </div>
      <nav class="app-nav">
        <a class="btn" href="admin.html">管理者画面</a>
        <a class="btn" href="gallery.html">ギャラリー</a>
        <a class="btn" href="index.html">参加者画面</a>
      </nav>
    </header>

    <section class="studio-grid">
      <article class="panel setup-panel">
        <div class="panel-heading">
          <div>
            <h2>動画の色を抽出</h2>
            <p class="muted">動画ファイルを読み込み、間隔を選択し、色を抽出します。</p>
          </div>
        </div>

        <label class="drop-zone" for="file">
          <span class="drop-icon">+</span>
          <span>
            <strong>動画を選択</strong>
            <small>mp4, mov, またはブラウザでサポートされている動画形式</small>
          </span>
          <input id="file" type="file" accept="video/mp4,video/quicktime,video/*" />
        </label>

        <div class="field-grid">
          <label>
            <span>シーケンス名</span>
            <input id="name" type="text" value="festival-sequence" />
          </label>

          <label>
            <span>間隔 (秒)</span>
            <input id="interval" type="number" value="0.5" min="0.1" step="0.1" />
          </label>
        </div>

        <div class="studio-actions">
          <button id="extract" class="primary" type="button">Extract</button>
          <button id="save" type="button">Save</button>
          <button id="clear" class="danger" type="button">Clear All</button>
        </div>

        <div class="color-editor-panel">
          <div class="panel-heading compact-heading">
            <div>
              <h2>Color Editor</h2>
              <p class="muted">Add colors by fixed step without a movie.</p>
            </div>
          </div>

          <div class="editor-grid">
            <label>
              <span>Color</span>
              <input id="editorColor" type="color" value="#00aaff" />
            </label>
            <label>
              <span>Step seconds</span>
              <input id="editorStep" type="number" value="0.2" min="0.1" step="0.1" />
            </label>
          </div>

          <div class="studio-actions compact">
            <button id="addEditorColor" class="primary" type="button">Add Color</button>
            <button id="clearEditor" type="button">Clear Editor</button>
          </div>
        </div>

        <p id="status" class="status">動画を選択してください</p>
      </article>

      <article class="panel preview-panel">
        <div class="panel-heading">
          <div>
            <h2>プレビュー</h2>
            <p class="muted">生成されたスウォッチは動画の下に表示されます。</p>
          </div>
        </div>

        <video id="video" controls muted playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="colors" class="colors color-timeline"></div>
      </article>
    </section>
  </main>

  <script type="module">
    import { saveSequence, clearSequences } from './realtime.js';

    const fileInput = document.getElementById('file');
    const nameInput = document.getElementById('name');
    const intervalInput = document.getElementById('interval');
    const extractBtn = document.getElementById('extract');
    const saveBtn = document.getElementById('save');
    const clearBtn = document.getElementById('clear');
    const editorColorInput = document.getElementById('editorColor');
    const editorStepInput = document.getElementById('editorStep');
    const addEditorColorBtn = document.getElementById('addEditorColor');
    const clearEditorBtn = document.getElementById('clearEditor');
    const status = document.getElementById('status');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const colors = document.getElementById('colors');

    let frames = [];

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;

      video.src = URL.createObjectURL(file);
      status.textContent = `読み込み完了: ${file.name}`;
      frames = [];
      colors.innerHTML = '';
    });

    function waitVideoSeek() {
      return new Promise(resolve => {
        video.onseeked = () => resolve();
      });
    }

    function getAverageColor() {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });

      const width = 80;
      const height = 45;

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(video, 0, 0, width, height);

      const data = ctx.getImageData(0, 0, width, height).data;

      let r = 0;
      let g = 0;
      let b = 0;
      let count = 0;

      for (let i = 0; i < data.length; i += 4) {
        r += data[i];
        g += data[i + 1];
        b += data[i + 2];
        count++;
      }

      r = Math.round(r / count);
      g = Math.round(g / count);
      b = Math.round(b / count);

      return rgbToHex(r, g, b);
    }

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b]
        .map(x => x.toString(16).padStart(2, '0'))
        .join('');
    }

    function renderColors() {
      colors.innerHTML = '';

      frames.forEach((frame, i) => {
        const div = document.createElement('div');
        div.className = 'color-chip timeline-chip';
        div.style.background = frame.color;
        div.title = `${i + 1}: ${frame.color}`;
        div.textContent = i + 1;
        colors.appendChild(div);
      });
    }

    extractBtn.addEventListener('click', async () => {
      if (!video.src) {
        alert('動画を選択してください');
        return;
      }

      frames = [];
      colors.innerHTML = '';

      const interval = Number(intervalInput.value) || 0.5;

      await new Promise(resolve => {
        if (video.readyState >= 1) resolve();
        else video.onloadedmetadata = resolve;
      });

      const duration = video.duration;

      status.textContent = '抽出中...';

      for (let t = 0; t < duration; t += interval) {
        video.currentTime = t;
        await waitVideoSeek();

        const color = getAverageColor();

        frames.push({
          time: t,
          color
        });

        status.textContent = `抽出中... ${frames.length} frames`;
      }

      renderColors();
      status.textContent = `抽出完了: ${frames.length} frames`;
    });

    saveBtn.addEventListener('click', async () => {
      if (!frames.length) {
        alert('先に色を抽出してください');
        return;
      }

      const sequence = {
        name: nameInput.value || 'festival-sequence',
        interval: Number(intervalInput.value) || 0.5,
        duration: Number.isFinite(video.duration)
          ? video.duration
          : ((frames.at(-1)?.time || 0) + (Number(intervalInput.value) || 0.5)),
        frames
      };

      await saveSequence(sequence);

      status.textContent = `保存しました: ${sequence.name}`;
      alert('保存しました。Adminで選択できます。');
    });

    clearBtn.addEventListener('click', async () => {
      if (!confirm('保存済みシーケンスを全削除しますか？')) return;

      await clearSequences();

      frames = [];
      colors.innerHTML = '';
      status.textContent = '全削除しました';
    });

    addEditorColorBtn.addEventListener('click', () => {
      const interval = Number(editorStepInput.value) || 0.2;
      const color = editorColorInput.value;
      const time = frames.length * interval;

      frames.push({
        time,
        color
      });

      intervalInput.value = String(interval);
      if (nameInput.value === 'festival-sequence') {
        nameInput.value = 'color-editor-sequence';
      }

      renderColors();
      status.textContent = `Color Editor: ${frames.length} frames / ${interval.toFixed(1)}s step`;
    });

    clearEditorBtn.addEventListener('click', () => {
      frames = [];
      colors.innerHTML = '';
      status.textContent = 'Color Editorをクリアしました';
    });
  </script>
</body>

</html>
