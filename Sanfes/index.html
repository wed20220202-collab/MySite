<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festival Color</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:," />
</head>

<body>
  <div id="colorStage"></div>

  <div id="loginPanel" class="login-panel">
    <h1>San Festival</h1>
    <p>学校アカウントでログインしてください</p>
    <button id="loginBtn">Googleでログイン</button>
    <p id="loginMessage"></p>
  </div>

  <div id="mainPanel" class="participant-ui hidden">
    <h1>FESTIVAL COLOR</h1>
    <p id="studentIdText">未ログイン</p>
    <p id="status">受信待機中...</p>
    <p id="colorText">#000000</p>
    <p id="uploadStatus">アップロード待機中</p>
    <button id="logoutBtn">ログアウト</button>
  </div>

  <button id="openCamera" class="camera-fab hidden">📷</button>

  <div id="miniCamera" class="mini-camera hidden">
    <video id="cameraPreview" autoplay playsinline muted></video>

    <div class="mini-controls">
      <button id="takePhoto">📸</button>
      <button id="recordVideo">●</button>
      <button id="stopRecord" disabled>■</button>
      <button id="closeCamera">×</button>
    </div>

    <p id="cameraStatus">カメラ待機中</p>
    <canvas id="photoCanvas" style="display:none;"></canvas>
  </div>

  <script type="module">
    import { watchActiveSession } from './realtime.js';

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    import {
      getStorage,
      ref as storageRef,
      uploadBytesResumable,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxL1LZYiJ33THiXjPM5njL3ZC2UfZXbKUgZBVZsvjr4Ia1U8bQyyPw8ZWpXjxj3MzSovQ/exec";

    const firebaseConfig = {
      apiKey: "AIzaSyC7oudfhfJC7zssUb0KR98tFy_lxvVT0bI",
      authDomain: "sanfestival-7a016.firebaseapp.com",
      databaseURL: "https://sanfestival-7a016-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sanfestival-7a016",
      storageBucket: "sanfestival-7a016.firebasestorage.app",
      messagingSenderId: "819550776861",
      appId: "1:819550776861:web:f38613132aef5bc3c7e0f4",
      measurementId: "G-516PDY0SYD"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const storage = getStorage(app);

    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ hd: "sankogakuen.jp" });

    const stage = document.getElementById('colorStage');
    const loginPanel = document.getElementById('loginPanel');
    const mainPanel = document.getElementById('mainPanel');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginMessage = document.getElementById('loginMessage');
    const studentIdText = document.getElementById('studentIdText');
    const status = document.getElementById('status');
    const colorText = document.getElementById('colorText');
    const uploadStatus = document.getElementById('uploadStatus');

    const openCameraBtn = document.getElementById('openCamera');
    const miniCamera = document.getElementById('miniCamera');
    const cameraPreview = document.getElementById('cameraPreview');
    const photoCanvas = document.getElementById('photoCanvas');
    const takePhotoBtn = document.getElementById('takePhoto');
    const recordVideoBtn = document.getElementById('recordVideo');
    const stopRecordBtn = document.getElementById('stopRecord');
    const closeCameraBtn = document.getElementById('closeCamera');
    const cameraStatus = document.getElementById('cameraStatus');

    let cameraStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let currentMimeType = '';

    loginBtn.addEventListener('click', async () => {
      loginMessage.textContent = 'ログイン中...';
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error(error);
        loginMessage.textContent = 'ログインに失敗しました';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
    });

    onAuthStateChanged(auth, async user => {
      if (!user) {
        localStorage.removeItem('festival_student_id');
        loginPanel.classList.remove('hidden');
        mainPanel.classList.add('hidden');
        openCameraBtn.classList.add('hidden');
        closeCamera();
        return;
      }

      const email = user.email || '';

      if (!email.endsWith('@sankogakuen.jp')) {
        alert('学校アカウント（@sankogakuen.jp）でログインしてください');
        await signOut(auth);
        return;
      }

      const studentId = email.split('@')[0];
      localStorage.setItem('festival_student_id', studentId);

      studentIdText.textContent = `ID：${studentId}`;
      loginPanel.classList.add('hidden');
      mainPanel.classList.remove('hidden');
      openCameraBtn.classList.remove('hidden');
    });

    function applyColor(session) {
      if (!session || !session.color) return;

      const color = session.color;
      stage.style.background = color;
      document.body.style.background = color;
      colorText.textContent = color;

      status.textContent = session.isPlaying
        ? `受信中：${session.sequenceName || 'manual'}`
        : '停止中';
    }

    watchActiveSession(applyColor);

    function getStudentId() {
      return localStorage.getItem('festival_student_id') || 'guest';
    }

    function getNextFileNumber() {
      const key = `festival_file_count_${getStudentId()}`;
      let count = Number(localStorage.getItem(key) || '0');
      count++;
      localStorage.setItem(key, String(count));
      return String(count).padStart(3, '0');
    }

    function createFileInfo(ext, type) {
      const studentId = getStudentId();
      const fileNo = getNextFileNumber();
      const fileName = `${studentId}_${fileNo}.${ext}`;

      return { studentId, fileNo, fileName, type };
    }

    async function openCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 640 },
            height: { ideal: 360 },
            frameRate: { ideal: 15, max: 24 }
          },
          audio: true
        });

        cameraPreview.srcObject = cameraStream;
        miniCamera.classList.remove('hidden');
        cameraStatus.textContent = 'カメラ起動中';
      } catch (error) {
        console.error(error);
        alert(`カメラ起動失敗：${error.name}`);
      }
    }

    function closeCamera() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }

      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }

      cameraPreview.srcObject = null;
      miniCamera.classList.add('hidden');
      recordVideoBtn.disabled = false;
      stopRecordBtn.disabled = true;
      cameraStatus.textContent = 'カメラ停止';
    }

    function getSupportedVideoType() {
      if (!window.MediaRecorder) return '';

      const types = [
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];

      for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }

      return '';
    }

    async function saveUrlToSpreadsheet(data) {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          mode: 'recordUrl',
          ...data
        })
      });

      const result = await res.json();

      if (!result.success) {
        throw new Error(result.message || 'Spreadsheet記録失敗');
      }

      return result;
    }

    async function uploadBlobToFirebaseStorage(blob, fileInfo, mimeType) {
      uploadStatus.textContent = `アップロード準備中：${fileInfo.fileName}`;
      cameraStatus.textContent = 'Storageへアップロード中...';

      const storagePath = `uploads/${fileInfo.studentId}/${fileInfo.fileName}`;
      const fileRef = storageRef(storage, storagePath);

      return new Promise((resolve, reject) => {
        const uploadTask = uploadBytesResumable(fileRef, blob, {
          contentType: mimeType
        });

        uploadTask.on(
          'state_changed',
          snapshot => {
            const percent = Math.round(
              (snapshot.bytesTransferred / snapshot.totalBytes) * 100
            );

            uploadStatus.textContent =
              `アップロード中：${fileInfo.fileName} / ${percent}%`;

            cameraStatus.textContent = `${percent}%`;
          },
          error => {
            console.error(error);
            uploadStatus.textContent = `アップロード失敗：${error.message}`;
            cameraStatus.textContent = 'アップロード失敗';
            alert(`アップロード失敗：${error.message}`);
            reject(error);
          },
          async () => {
            try {
              const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);

              await saveUrlToSpreadsheet({
                studentId: fileInfo.studentId,
                fileNo: fileInfo.fileNo,
                type: fileInfo.type,
                fileName: fileInfo.fileName,
                storagePath,
                downloadURL,
                mimeType,
                size: blob.size
              });

              uploadStatus.innerHTML =
                `アップロード完了：<a href="${downloadURL}" target="_blank" rel="noopener">開く</a>`;

              cameraStatus.textContent = `保存完了：${fileInfo.fileName}`;
              resolve(downloadURL);

            } catch (error) {
              console.error(error);
              uploadStatus.textContent = `記録失敗：${error.message}`;
              cameraStatus.textContent = 'Spreadsheet記録失敗';
              reject(error);
            }
          }
        );
      });
    }

    async function takePhoto() {
      if (!cameraStream) {
        alert('先にカメラを起動してください');
        return;
      }

      const w = cameraPreview.videoWidth;
      const h = cameraPreview.videoHeight;

      if (!w || !h) {
        alert('カメラ映像の取得中です。少し待ってください');
        return;
      }

      photoCanvas.width = w;
      photoCanvas.height = h;

      const ctx = photoCanvas.getContext('2d');
      ctx.drawImage(cameraPreview, 0, 0, w, h);

      photoCanvas.toBlob(async blob => {
        if (!blob) {
          alert('写真生成に失敗しました');
          return;
        }

        const fileInfo = createFileInfo('png', 'photo');
        await uploadBlobToFirebaseStorage(blob, fileInfo, 'image/png');
      }, 'image/png');
    }

    function startRecord() {
      if (!cameraStream) {
        alert('先にカメラを起動してください');
        return;
      }

      if (!window.MediaRecorder) {
        alert('このブラウザはWeb録画に対応していません');
        return;
      }

      recordedChunks = [];
      currentMimeType = getSupportedVideoType();

      if (!currentMimeType) {
        alert('この端末では対応している動画形式がありません');
        return;
      }

      mediaRecorder = new MediaRecorder(cameraStream, {
        mimeType: currentMimeType
      });

      mediaRecorder.ondataavailable = event => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, {
          type: currentMimeType
        });

        if (blob.size === 0) {
          alert('動画データが作成されませんでした');
          return;
        }

        const ext = currentMimeType.includes('mp4') ? 'mp4' : 'webm';
        const fileInfo = createFileInfo(ext, 'video');

        await uploadBlobToFirebaseStorage(blob, fileInfo, currentMimeType);
      };

      mediaRecorder.start(1000);

      recordVideoBtn.disabled = true;
      stopRecordBtn.disabled = false;
      cameraStatus.textContent = '録画中...';
    }

    function stopRecord() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }

      recordVideoBtn.disabled = false;
      stopRecordBtn.disabled = true;
    }

    openCameraBtn.addEventListener('click', openCamera);
    closeCameraBtn.addEventListener('click', closeCamera);
    takePhotoBtn.addEventListener('click', takePhoto);
    recordVideoBtn.addEventListener('click', startRecord);
    stopRecordBtn.addEventListener('click', stopRecord);
  </script>
</body>
</html>
